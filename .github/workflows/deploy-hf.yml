name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use hfconfig as README.md
        run: |
          mv .hfconfig README.md
      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: barney5501/SeinfelDB
          huggingface_repo_id: Barney5501/seinfelDB
          hf_token: ${{ secrets.HF_WRITE_TOKEN }}
